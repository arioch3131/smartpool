name: Code Quality

on:
  push:
    branches: [ main, develop ]
    paths:
      - 'src/**'
      - 'examples/**'
      - 'pyproject.toml'
      - '.github/workflows/code_quality.yml'
  pull_request:
    branches: [ main ]
    paths:
      - 'src/**'
      - 'examples/**'
      - 'pyproject.toml'
      - '.github/workflows/code_quality.yml'

jobs:
  quality:
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: "3.12"

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -e ".[dev]"
        pip install -e ".[all]"

    - name: Run Ruff format (check)
      run: |
        ruff format --check .

    - name: Run Ruff lint
      run: |
        ruff check .

    - name: Run mypy (type checking)
      run: |
        mypy src/
