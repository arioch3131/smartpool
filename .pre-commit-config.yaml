# pre-commit configuration for adaptive-memory-pool
# Installs all code quality hooks

repos:
  # Basic file hooks
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v6.0.0
    hooks:
      - id: trailing-whitespace
      - id: end-of-file-fixer
      - id: check-yaml
      - id: check-json
      - id: check-toml
      - id: check-merge-conflict
      - id: check-added-large-files
        args: ['--maxkb=500']
      - id: mixed-line-ending
        args: ['--fix=lf']

  # Ruff - Linting, import sorting, and formatting
  - repo: https://github.com/astral-sh/ruff-pre-commit
    rev: v0.14.0
    hooks:
      - id: ruff-check
        name: ruff check
        args: [--fix]
      - id: ruff-format
        name: ruff format

  # MyPy - Type checking
  - repo: https://github.com/pre-commit/mirrors-mypy
    rev: v1.17.1
    hooks:
      - id: mypy
        name: mypy
        args: ["--config-file", "pyproject.toml"]
        pass_filenames: false
        entry: mypy src/
        additional_dependencies: [
          # Main project dependencies
          "Pillow>=9.0.0",
          "PyQt6>=6.0.0",
          "numpy>=1.20.0",
          "SQLAlchemy>=1.4.0",
          # Example dependencies
          "uvicorn>=0.33.0",
          "fastapi>=0.116.1",
          "Flask>=3.0.0",
          "psutil>=7.0.0",
          "requests>=2.0.0",
          # Specific types if necessary
          "types-requests",
        ]

  # Pre-push quality gate
  - repo: local
    hooks:
      - id: ruff-check-pre-push
        name: ruff check (pre-push)
        entry: ruff check .
        language: system
        pass_filenames: false
        stages: [pre-push]
      - id: ruff-format-check-pre-push
        name: ruff format --check (pre-push)
        entry: ruff format --check .
        language: system
        pass_filenames: false
        stages: [pre-push]
      - id: mypy-pre-push
        name: mypy (pre-push)
        entry: mypy --config-file pyproject.toml src/
        language: system
        pass_filenames: false
        stages: [pre-push]
      - id: pytest-pre-push
        name: pytest (pre-push)
        entry: pytest
        language: system
        pass_filenames: false
        stages: [pre-push]

# Stage configuration
default_stages: [pre-commit, pre-push]
fail_fast: false  # Continue even if a hook fails to see all problems

# Global exclusions
exclude: |
  (?x)^(
    docs/.*|
    build/.*|
    dist/.*|
    \.eggs/.*|
    .*\.egg-info/.*|
    __pycache__/.*|
    \.git/.*|
    \.mypy_cache/.*|
    \.pytest_cache/.*|
    \.coverage.*
  )$
